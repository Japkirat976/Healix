<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup | Healix</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="login-container">

        <form class="login-card" id="foodForm">

            <h1>Food Preferences</h1>

            <p class="subtitle">
                Help us personalize your meal plans.
            </p>
        
            <div class="form-group">
            
                <label for="foodPreference">
                    Food Preference
                </label>
            
                <select id="foodPreference">
                
                    <option value="">
                        Select
                    </option>
                
                    <option value="Vegetarian">
                        Vegetarian
                    </option>
                
                    <option value="Vegan">
                        Vegan
                    </option>
                
                    <option value="Non-Vegetarian">
                        Non-Vegetarian
                    </option>

                    <option value="Pescatarian">
                        Pescatarian
                    </option>
                
                </select>
            
            </div>
        
            <div class="form-group">
            
                <label for="favoriteFoods">
                    Favorite Foods
                </label>
            
                <input
                    type="text"
                    id="favoriteFoods"
                    placeholder="Paneer, Rajma, Pasta"
                >
            
            </div>
        
            <div class="form-group">
            
                <label for="dislikedFoods">
                    Disliked Foods
                </label>
            
                <input
                    type="text"
                    id="dislikedFoods"
                    placeholder="Broccoli, Mushrooms"
                >
            
            </div>
        
            <div class="form-group">
            
                <label for="dietaryRestrictions">
                    Dietary Restrictions
                </label>
            
                <input
                    type="text"
                    id="dietaryRestrictions"
                    placeholder="Lactose Intolerance"
                >
            
            </div>
        
            <div class="form-group">
            
                <label for="budget">
                    Monthly Food Budget (₹)
                </label>
            
                <input
                    type="number"
                    id="budget"
                    placeholder="5000"
                >
            
            </div>
        
            <p id="errorMessage"></p>
        
            <button type="submit" class="btn">
                Continue
            </button>
        
        </form>

    </div>

    <script src="js/profile-step2.js"></script>

</body>
</html>
