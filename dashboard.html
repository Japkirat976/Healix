<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Healix</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="dashboard-container">

        <h1>Welcome to Healix 💜</h1>

        <div class="dashboard-grid">

            <div class="card">
                <h2>BMI</h2>
                <p id="bmi"></p>
            </div>

            <div class="card">
                <h2>Daily Calories</h2>
                <p id="calories"></p>
            </div>

            <div class="card">
                <h2>Water Intake</h2>
                <p id="water"></p>
            </div>

            <div class="card">
                <h2>Goal Weight</h2>
                <p id="goal"></p>
            </div>

            <div class="card">
                <h2>Food Preference</h2>
                <p id="food"></p>
            </div>

            <div class="card">
                <h2>Activity Level</h2>
                <p id="activity"></p>
            </div>

        </div>

    </div>

    <script src="js/dashboard.js"></script>

</body>
</html>
