<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup | Healix</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="login-container">

        <form class="login-card" id="profileForm">

            <h1>Basic Information</h1>

            <p class="subtitle">
                Tell us a little about yourself.
            </p>

            <div class="form-group">
                <label for="age">Age</label>
                <input
                    type="number"
                    id="age"
                    placeholder="Enter your age"
                >
            </div>

            <div class="form-group">

                <label>Gender</label>

                <div class="radio-group">

                    <label>
                        <input type="radio"
                               name="gender"
                               value="Female">
                        Female
                    </label>

                    <label>
                        <input type="radio"
                               name="gender"
                               value="Male">
                        Male
                    </label>

                    <label>
                        <input type="radio"
                               name="gender"
                               value="Other">
                        Other
                    </label>

                </div>

            </div>

            <div class="form-group">
                <label for="height">
                    Height (cm)
                </label>

                <input
                    type="number"
                    id="height"
                    placeholder="Enter height in cm"
                >
            </div>

            <div class="form-group">
                <label for="weight">
                    Weight (kg)
                </label>

                <input
                    type="number"
                    id="weight"
                    placeholder="Enter weight in kg"
                >
            </div>

            <div class="form-group">
                <label for="goalWeight">
                    Goal Weight (kg)
                </label>

                <input
                    type="number"
                    id="goalWeight"
                    placeholder="Enter goal weight in kg"
                >
            </div>
            <p id="errorMessage"></p>

            <button type="submit" class="btn">
                Continue
            </button>

        </form>

    </div>

    <script src="js/profile-step1.js"></script>

</body>
</html>
